server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://documentdb1.cd08o26qs27b.ap-south-1.rds.amazonaws.com:5432/documentdb1
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:ParveenMulla14}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
