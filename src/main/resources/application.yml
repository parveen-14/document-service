topic:
  document-uploaded: documentUploadTopic

aws:
  region: AWS_REGION
  accessKey: AWS_ACCESS_KEY_ID
  secretKey: AWS_SECRET_ACCESS_KEY

  s3:
    bucket: documentdata-bucket